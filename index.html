<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>SaaS Portal | Login</title>
    <link rel="stylesheet" href="style.css" />
    <link
      href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600&display=swap"
      rel="stylesheet"
    />
  </head>
  <body>
    <div class="background-blobs">
      <div class="blob blob-1"></div>
      <div class="blob blob-2"></div>
    </div>

    <main class="login-container">
      <form id="loginForm" class="login-card">
        <header>
          <h1>Portal de Autogestión</h1>
          <p>Ingresa tus datos para acceder a tu historial</p>
        </header>

        <div class="input-group">
          <label for="dni">Número de DNI</label>
          <input
            type="text"
            id="dni"
            placeholder="xxxxxxxx"
            inputmode="numeric"
            pattern="[0-9]*"
            required
          />
        </div>

        <div class="input-group">
          <label for="password">Contraseña</label>
          <input
            type="password"
            id="password"
            placeholder="********"
            required
          />
        </div>

        <button type="submit" id="loginBtn">
          <span class="btn-text">Ingresar a Mi Portal</span>
          <div class="loader"></div>
        </button>

        <div class="register-link" style="margin-bottom: 8px;">
          <p>¿Es tu primera vez ingresando? <a href="crear-clave.html">Crea tu contraseña aquí</a></p>
        </div>
        
        <div class="register-link" style="margin-bottom: 8px;">
          <p>¿Olvidaste tu clave? <a href="recuperar-clave.html">Recupérala aquí</a></p>
        </div>
        
        <div class="register-link">
          <p>¿Tuviste un siniestro reciente? <a href="https://linktree.rafaelallendeseguros.digital">Haz tu denuncia aquí</a></p>
        </div>

        <footer id="message" class="hidden"></footer>
      </form>
    </main>

    <script src="main.js"></script>
  </body>
</html>
